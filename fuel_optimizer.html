<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Optimizer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
  .app{max-width:720px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
  .header{display:flex;align-items:center;gap:12px;margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid #e2e8f0}
  .hico{width:40px;height:40px;background:#2563eb;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .header h1{font-size:19px;font-weight:700;color:#1a202c;letter-spacing:-0.02em}
  .header p{font-size:11px;color:#94a3b8;font-family:'DM Mono',monospace;margin-top:2px}
  .loc-btn{margin-left:auto;display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:11px;color:#2563eb;background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;padding:6px 11px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .loc-btn:hover{background:#dbeafe}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:1.25rem;margin-bottom:.875rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .sec-label{font-size:10px;font-family:'DM Mono',monospace;color:#94a3b8;letter-spacing:.09em;text-transform:uppercase;margin-bottom:.875rem}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:.875rem}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.875rem}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;color:#64748b;font-weight:500}
  .field input[type=number],.field select{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;color:#1a202c;font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px;outline:none;width:100%;transition:border-color .15s}
  .field input:focus,.field select:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
  .field select option{background:#fff}
  .tog-row{display:flex;gap:5px;margin-top:1px}
  .tog{flex:1;padding:7px 0;border:1px solid #e2e8f0;border-radius:7px;background:#f8fafc;color:#94a3b8;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s}
  .tog.on{border-color:#2563eb;color:#2563eb;background:#eff6ff}
  .gauge-wrap{display:flex;flex-direction:column;gap:7px;margin-top:.5rem}
  .gauge-top{display:flex;justify-content:space-between;align-items:center}
  .gauge-top label{font-size:11px;color:#64748b;font-weight:500}
  .gauge-val{font-family:'DM Mono',monospace;font-size:12px;color:#2563eb;font-weight:500}
  .gauge-track{width:100%;height:8px;background:#e2e8f0;border-radius:99px;overflow:hidden}
  .gauge-fill{height:100%;background:linear-gradient(90deg,#2563eb,#3b82f6);border-radius:99px;transition:width .18s}
  .gauge-lbls{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:#cbd5e1}
  .sum-pill{display:inline-flex;align-items:center;gap:6px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:99px;padding:5px 13px;font-family:'DM Mono',monospace;font-size:11px;color:#2563eb;margin-top:.875rem}
  .dest-wrap{position:relative}
  .dest-inp{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;color:#1a202c;font-family:'DM Mono',monospace;font-size:12px;padding:10px 12px;outline:none;transition:all .15s}
  .dest-inp:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
  .dest-inp::placeholder{color:#cbd5e1}
  .autocomplete-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #e2e8f0;border-radius:9px;overflow:hidden;z-index:100;display:none;box-shadow:0 4px 16px rgba(0,0,0,.1)}
  .autocomplete-list.open{display:block}
  .ac-item{padding:9px 12px;font-family:'DM Mono',monospace;font-size:11px;color:#475569;cursor:pointer;border-bottom:1px solid #f1f5f9;line-height:1.4;transition:background .1s}
  .ac-item:last-child{border-bottom:none}
  .ac-item:hover,.ac-item.active{background:#eff6ff;color:#1e40af}
  /* segmented control used for search mode, route type, prioritise */
  .seg{display:flex;gap:0;border:1px solid #e2e8f0;border-radius:9px;overflow:hidden;background:#f8fafc;margin-bottom:.875rem}
  .seg-btn{flex:1;padding:8px 4px;background:transparent;color:#94a3b8;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;border:none;cursor:pointer;transition:all .12s;border-right:1px solid #e2e8f0;white-space:nowrap}
  .seg-btn:last-child{border-right:none}
  .seg-btn.on{background:#fff;color:#2563eb;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .seg-btn.on.green{color:#16a34a}
  .seg-btn.on.amber{color:#d97706}
  .corridor-opts{display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid #f1f5f9}
  .corridor-opts.show{display:block}
  .info-note{font-family:'DM Mono',monospace;font-size:10px;color:#64748b;line-height:1.6;margin-top:.5rem;padding:.625rem .875rem;background:#f8fafc;border-radius:7px;border-left:3px solid #2563eb}
  .cta{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:9px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:.75rem;transition:all .15s;letter-spacing:-.01em;box-shadow:0 2px 8px rgba(37,99,235,.3)}
  .cta:hover:not(:disabled){background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.4)}
  .cta:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* route tab bar shown in results */
  .route-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
  .rtab{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:120px;padding:10px 8px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .rtab:hover{border-color:#93c5fd;background:#fafcff}
  .rtab.active{border-color:#2563eb;border-width:1.5px;background:#fafcff;box-shadow:0 2px 8px rgba(37,99,235,.12)}
  .rtab.loading{opacity:.6;pointer-events:none}
  .rtab.cached{border-color:#16a34a}
  .rtab-label{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:#64748b}
  .rtab.active .rtab-label{color:#2563eb}
  .rtab.cached .rtab-label{color:#16a34a}
  .rtab-dist{font-family:'DM Mono',monospace;font-size:10px;color:#94a3b8}
  .rtab-stations{font-family:'DM Mono',monospace;font-size:10px;color:#94a3b8}
  .rtab-best{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:#2563eb;margin-top:1px}
  .rtab.cached .rtab-best{color:#16a34a}
  .res-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;margin-top:1.25rem}
  .res-hdr h2{font-size:10px;font-family:'DM Mono',monospace;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase}
  .res-meta{font-family:'DM Mono',monospace;font-size:10px;color:#cbd5e1}
  .filter-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.75rem;padding:.875rem 1rem;background:#fff;border:1px solid #e2e8f0;border-radius:11px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .chip{font-family:'DM Mono',monospace;font-size:10px;padding:4px 11px;border-radius:99px;border:1px solid #e2e8f0;background:transparent;color:#94a3b8;cursor:pointer;transition:all .12s}
  .chip.on{border-color:#2563eb;color:#2563eb;background:#eff6ff}
  .sep{width:1px;background:#e2e8f0;height:20px;flex-shrink:0}
  .rng-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:160px}
  .rng-wrap label{font-size:10px;color:#94a3b8;font-family:'DM Mono',monospace;white-space:nowrap}
  .rng-wrap input[type=range]{flex:1;accent-color:#2563eb}
  .rng-val{font-family:'DM Mono',monospace;font-size:11px;color:#2563eb;min-width:30px;text-align:right;font-weight:500}
  .scard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:.875rem 1rem;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:box-shadow .15s}
  .scard:hover{box-shadow:0 3px 10px rgba(0,0,0,.08)}
  .scard.best{border-color:#2563eb;border-width:1.5px;background:#fafcff}
  .scard.hidden{display:none}
  .sc-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
  .sc-name{font-size:13px;font-weight:600;color:#1a202c}
  .bbadge{font-family:'DM Mono',monospace;font-size:9px;color:#94a3b8;background:#f1f5f9;border-radius:4px;padding:2px 6px}
  .corridor-badge{font-family:'DM Mono',monospace;font-size:9px;color:#2563eb;background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;padding:2px 6px}
  .sc-meta{display:flex;gap:12px;font-family:'DM Mono',monospace;font-size:10px;color:#94a3b8;flex-wrap:wrap}
  .nav-link{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:10px;color:#2563eb;text-decoration:none;border:1px solid #bfdbfe;border-radius:5px;padding:3px 8px;margin-top:6px;background:#eff6ff;transition:all .12s}
  .nav-link:hover{background:#dbeafe;border-color:#93c5fd}
  .price-col{text-align:right;flex-shrink:0}
  .p-eff{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;color:#1a202c}
  .p-sub{font-family:'DM Mono',monospace;font-size:9px;color:#94a3b8;margin-bottom:3px}
  .p-save{font-family:'DM Mono',monospace;font-size:11px;color:#16a34a;font-weight:600}
  .p-total{font-family:'DM Mono',monospace;font-size:10px;color:#94a3b8;margin-top:2px}
  .p-best{font-family:'DM Mono',monospace;font-size:11px;color:#2563eb;font-weight:600}
  .err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:9px;padding:.875rem 1rem;font-family:'DM Mono',monospace;font-size:11px;color:#dc2626;margin-top:.75rem}
  .warn-box{background:#fffbeb;border:1px solid #fde68a;border-radius:9px;padding:.875rem 1rem;font-family:'DM Mono',monospace;font-size:11px;color:#92400e;margin-top:.75rem}
  .progress-bar{height:4px;background:#e2e8f0;border-radius:99px;margin-top:.75rem;overflow:hidden;display:none}
  .progress-fill{height:100%;background:#2563eb;border-radius:99px;transition:width .3s}
  .divider{height:1px;background:#f1f5f9;margin:.875rem 0}
  @media(max-width:500px){.g3{grid-template-columns:1fr 1fr}.sc-meta{gap:7px}.rtab{min-width:90px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="hico">⛽</div>
    <div>
      <h1>Fuel Optimizer</h1>
      <p id="loc-label">NSW FuelCheck · TomTom Routing</p>
    </div>
    <button class="loc-btn" id="loc-btn" onclick="detectLocation()">
      <i class="ti ti-current-location"></i>
      <span id="loc-btn-txt">Detect Location</span>
    </button>
  </div>

  <!-- Vehicle settings -->
  <div class="card">
    <div class="sec-label">Vehicle & Trip</div>
    <div class="g2" style="margin-bottom:.875rem">
      <div class="field">
        <label>Fuel Economy (L/100km)</label>
        <input type="number" id="economy" value="8.5" step="0.5" min="1" max="30" oninput="updateSummary()">
      </div>
      <div class="field">
        <label>Tank Capacity (L)</label>
        <input type="number" id="tank" value="60" step="5" min="10" max="200" oninput="updateSummary()">
      </div>
    </div>
    <div class="g3" style="margin-bottom:.875rem">
      <div class="field">
        <label>Fuel Type</label>
        <select id="fueltype" onchange="updateSummary()">
          <option>E10</option><option>U91</option><option>U95</option>
          <option>U98</option><option>P98</option><option>Diesel</option>
        </select>
      </div>
      <div class="field">
        <label>Trip Mode</label>
        <div class="tog-row">
          <button class="tog on" id="tog-one" onclick="setTrip('one')">One Way</button>
          <button class="tog" id="tog-ret" onclick="setTrip('return')">Return</button>
        </div>
      </div>
      <div class="field">
        <label>Override Fill (L, 0=auto)</label>
        <input type="number" id="manual-vol" value="0" step="1" min="0" max="200" oninput="updateSummary()">
      </div>
    </div>
    <div class="gauge-wrap">
      <div class="gauge-top">
        <label>Current Tank Level</label>
        <span class="gauge-val" id="gauge-label">25%</span>
      </div>
      <input type="range" min="0" max="100" step="5" value="25" id="gauge" style="width:100%;accent-color:#2563eb" oninput="updateGauge()">
      <div class="gauge-track"><div class="gauge-fill" id="gauge-fill" style="width:25%"></div></div>
      <div class="gauge-lbls"><span>Empty</span><span>Half</span><span>Full</span></div>
    </div>
    <div class="sum-pill">
      <i class="ti ti-droplet"></i>
      Will fill <strong style="color:#1e40af;margin:0 3px" id="fill-l">45.0 L</strong> of <span id="fill-ft">E10</span>
    </div>
  </div>

  <!-- Search + Route options -->
  <div class="card">
    <div class="sec-label">Search Mode</div>
    <div class="seg" id="seg-search">
      <button class="seg-btn on" id="mode-near" onclick="setMode('near')"><i class="ti ti-map-pin"></i> Near Me</button>
      <button class="seg-btn" id="mode-corridor" onclick="setMode('corridor')"><i class="ti ti-route"></i> Along Route</button>
    </div>

    <!-- Near Me radius -->
    <div id="near-opts">
      <div class="field">
        <label>Search Radius around me</label>
        <div style="display:flex;align-items:center;gap:7px;margin-top:4px">
          <input type="range" min="5" max="50" step="5" value="10" id="radius" style="flex:1;accent-color:#2563eb" oninput="document.getElementById('rad-val').textContent=this.value+'km'">
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:#2563eb;min-width:32px;font-weight:500" id="rad-val">10km</span>
        </div>
      </div>
    </div>

    <!-- Along Route corridor options -->
    <div class="corridor-opts" id="corridor-opts">
      <div class="g2">
        <div class="field">
          <label>Corridor Width (km off route)</label>
          <div style="display:flex;align-items:center;gap:7px;margin-top:4px">
            <input type="range" min="1" max="15" step="1" value="5" id="corridor-width" style="flex:1;accent-color:#2563eb" oninput="document.getElementById('cw-val').textContent=this.value+'km'">
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:#2563eb;min-width:32px;font-weight:500" id="cw-val">5km</span>
          </div>
        </div>
        <div class="field">
          <label>Sample every (km along route)</label>
          <div style="display:flex;align-items:center;gap:7px;margin-top:4px">
            <input type="range" min="5" max="30" step="5" value="10" id="sample-km" style="flex:1;accent-color:#2563eb" oninput="document.getElementById('sk-val').textContent=this.value+'km'">
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:#2563eb;min-width:32px;font-weight:500" id="sk-val">10km</span>
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Route Type -->
    <div class="sec-label">Route Type <span style="color:#bfdbfe;font-size:9px;margin-left:4px">search all 3 to compare</span></div>
    <div class="seg">
      <button class="seg-btn on" id="rt-fastest" onclick="setRouteType('fastest')">⚡ Fastest</button>
      <button class="seg-btn" id="rt-shortest" onclick="setRouteType('shortest')">📏 Shortest</button>
      <button class="seg-btn" id="rt-eco" onclick="setRouteType('eco')">🌿 Eco</button>
    </div>

    <!-- Prioritise -->
    <div class="sec-label">Prioritise</div>
    <div class="seg">
      <button class="seg-btn on" id="pri-savings" onclick="setPriority('savings')">💰 Max Savings</button>
      <button class="seg-btn" id="pri-route" onclick="setPriority('route')">🛣 Stay on Route</button>
    </div>

    <div class="divider"></div>

    <!-- Destination -->
    <div class="sec-label" style="margin-bottom:.5rem">Destination</div>
    <div class="dest-wrap">
      <input class="dest-inp" type="text" id="dest" placeholder="e.g. Mt Annan, Airds, Sydney Airport…" autocomplete="off" oninput="onDestInput()" onkeydown="onDestKey(event)">
      <div class="autocomplete-list" id="ac-list"></div>
    </div>

    <button class="cta" id="cta-btn" onclick="runSearch()">
      <i class="ti ti-bolt"></i> Find Best Station · Ranked by Savings
    </button>
    <div class="progress-bar" id="prog-bar">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="error-box" style="display:none" class="err-box"></div>
  <div id="warn-box" style="display:none" class="warn-box"></div>

  <!-- Results -->
  <div id="results-section" style="display:none">
    <div class="res-hdr">
      <h2>Route Comparison</h2>
      <span class="res-meta" id="res-meta"></span>
    </div>

    <!-- Route tabs -->
    <div class="route-tabs" id="route-tabs"></div>

    <div class="filter-bar">
      <button class="chip on" id="chip-all" onclick="setFilter('all')">All</button>
      <button class="chip" id="chip-rt" onclick="setFilter('route')">
        <i class="ti ti-route"></i> On-Route ≤3km
      </button>
      <div class="sep"></div>
      <div class="rng-wrap">
        <label>Max detour</label>
        <input type="range" min="0" max="20" step="1" value="20" id="detour-f" oninput="applyFilters()">
        <span class="rng-val" id="detour-v">any</span>
      </div>
    </div>
    <div id="station-list"></div>
  </div>
</div>

<script>
  const NSW_API_KEY = "1MYSRAx5yvqHUZc6VGtxix6oMA2qgfRT";
  const NSW_AUTH    = "Basic MU1ZU1JBeDV5dnFIVVpjNlZHdHhpeDZvTUEycWdmUlQ6Qk12V2FjdzE1RXQ4dUZHRg==";
  const TOMTOM_KEY  = "RoiDwi5Y35NaVKTJEyFTX5VtED45vS2e";

  let tripMode='one', filterMode='all', searchMode='near', routeType='fastest', priority='savings';
  let userLat=null, userLon=null;

  // Cache: keyed by routeType → {results, baseDist, routeKm, routeMins}
  const cache={};
  let activeRouteType='fastest';

  // ── Math helpers ──────────────────────────────────────────────────────────────
  function haversineRaw(lat1,lon1,lat2,lon2){
    const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }
  function haversine(a,b,c,d){return haversineRaw(a,b,c,d)*1.28;}

  // ── TomTom ────────────────────────────────────────────────────────────────────
  const ttRouteTypeMap={fastest:'fastest',shortest:'shortest',eco:'eco'};

  async function tomtomRoute(olat,olon,dlat,dlon,rtype){
    const tt=ttRouteTypeMap[rtype]||'fastest';
    const url=`https://api.tomtom.com/routing/1/calculateRoute/${olat},${olon}:${dlat},${dlon}/json?key=${TOMTOM_KEY}&travelMode=car&routeType=${tt}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(10000)});
    if(!r.ok) throw new Error('TomTom '+r.status);
    const d=await r.json();
    const route=d.routes[0];
    const distKm=route.summary.lengthInMeters/1000;
    const mins=Math.round(route.summary.travelTimeInSeconds/60);
    const points=[];
    for(const leg of route.legs) for(const pt of leg.points) points.push([pt.latitude,pt.longitude]);
    return{distKm,mins,points};
  }

  async function tomtomDist(olat,olon,dlat,dlon){
    try{
      const url=`https://api.tomtom.com/routing/1/calculateRoute/${olat},${olon}:${dlat},${dlon}/json?key=${TOMTOM_KEY}&travelMode=car&routeType=fastest`;
      const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
      if(!r.ok) throw new Error();
      const d=await r.json();
      return d.routes[0].summary.lengthInMeters/1000;
    }catch{return haversine(olat,olon,dlat,dlon);}
  }

  // ── Polyline helpers ──────────────────────────────────────────────────────────
  function samplePolyline(points,stepKm){
    if(!points.length)return[];
    const s=[points[0]];let acc=0;
    for(let i=1;i<points.length;i++){
      acc+=haversineRaw(points[i-1][0],points[i-1][1],points[i][0],points[i][1]);
      if(acc>=stepKm){s.push(points[i]);acc=0;}
    }
    const last=points[points.length-1];
    if(s[s.length-1]!==last)s.push(last);
    return s;
  }
  function ptToSegDist(plat,plon,alat,alon,blat,blon){
    const dx=blon-alon,dy=blat-alat,lenSq=dx*dx+dy*dy;
    if(!lenSq)return haversineRaw(plat,plon,alat,alon);
    let t=Math.max(0,Math.min(1,((plon-alon)*dx+(plat-alat)*dy)/lenSq));
    return haversineRaw(plat,plon,alat+t*dy,alon+t*dx);
  }
  function distToPolyline(lat,lon,pts){
    let m=Infinity;
    for(let i=1;i<pts.length;i++) m=Math.min(m,ptToSegDist(lat,lon,pts[i-1][0],pts[i-1][1],pts[i][0],pts[i][1]));
    return m;
  }

  // ── Nominatim ─────────────────────────────────────────────────────────────────
  async function geocode(q){
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=au`,{headers:{'User-Agent':'FuelOptimizer/2.0'}});
    const d=await r.json();
    if(!d.length)throw new Error('Could not geocode: '+q);
    return[parseFloat(d[0].lat),parseFloat(d[0].lon)];
  }

  // ── NSW FuelCheck ─────────────────────────────────────────────────────────────
  async function getNSWToken(){
    const r=await fetch('https://api.onegov.nsw.gov.au/oauth/client_credential/accesstoken?grant_type=client_credentials',{headers:{Authorization:NSW_AUTH}});
    if(!r.ok)throw new Error('NSW auth failed: '+r.status);
    return(await r.json()).access_token;
  }
  async function fetchStations(lat,lon,radiusKm,fuelType,token){
    const r=await fetch('https://api.onegov.nsw.gov.au/FuelPriceCheck/v1/fuel/prices/nearby',{
      method:'POST',
      headers:{Authorization:`Bearer ${token}`,apikey:NSW_API_KEY,'Content-Type':'application/json; charset=utf-8',transactionid:'1',requesttimestamp:'01/01/2024 00:00:00 AM'},
      body:JSON.stringify({FuelType:fuelType,Latitude:lat,Longitude:lon,Radius:radiusKm,SortBy:'Price'})
    });
    if(!r.ok)throw new Error('NSW FuelCheck: '+r.status);
    return r.json();
  }
  function parseStations(raw,fLat,fLon){
    const pl={};
    (raw.prices||[]).forEach(p=>{if(p.price!=null)pl[p.stationcode]=parseFloat(p.price)/100;});
    return(raw.stations||[]).filter(s=>pl[s.code]!=null).map(s=>({
      name:s.name||'Unknown',brand:s.brand||'',price:pl[s.code],
      lat:parseFloat(s.location?.latitude||fLat),lon:parseFloat(s.location?.longitude||fLon),
      address:s.address||''
    }));
  }

  // ── GPS ───────────────────────────────────────────────────────────────────────
  function detectLocation(){
    document.getElementById('loc-btn-txt').textContent='Locating…';
    if(!navigator.geolocation){showErr('Geolocation not supported.');return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{userLat=pos.coords.latitude;userLon=pos.coords.longitude;
        document.getElementById('loc-btn-txt').textContent=`${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;
        document.getElementById('loc-label').textContent='📍 GPS location active';},
      ()=>{document.getElementById('loc-btn-txt').textContent='Location denied';
        showWarn('Location access denied — using Sydney CBD.');userLat=-33.8688;userLon=151.2093;}
    );
  }

  // ── UI state ──────────────────────────────────────────────────────────────────
  function updateGauge(){
    const v=document.getElementById('gauge').value;
    document.getElementById('gauge-fill').style.width=v+'%';
    document.getElementById('gauge-label').textContent=v+'%';
    updateSummary();
  }
  function updateSummary(){
    const tank=parseFloat(document.getElementById('tank').value)||60;
    const pct=parseFloat(document.getElementById('gauge').value)||25;
    const mv=parseFloat(document.getElementById('manual-vol').value)||0;
    const ft=document.getElementById('fueltype').value;
    const fill=mv>0?mv.toFixed(1):(tank*(1-pct/100)).toFixed(1);
    document.getElementById('fill-l').textContent=fill+' L';
    document.getElementById('fill-ft').textContent=ft;
  }
  function setTrip(m){
    tripMode=m;
    document.getElementById('tog-one').classList.toggle('on',m==='one');
    document.getElementById('tog-ret').classList.toggle('on',m==='return');
  }
  function setMode(m){
    searchMode=m;
    document.getElementById('mode-near').classList.toggle('on',m==='near');
    document.getElementById('mode-corridor').classList.toggle('on',m==='corridor');
    document.getElementById('near-opts').style.display=m==='near'?'block':'none';
    document.getElementById('corridor-opts').classList.toggle('show',m==='corridor');
  }
  function setRouteType(rt){
    routeType=rt;
    ['fastest','shortest','eco'].forEach(t=>document.getElementById('rt-'+t).classList.toggle('on',t===rt));
  }
  function setPriority(p){
    priority=p;
    document.getElementById('pri-savings').classList.toggle('on',p==='savings');
    document.getElementById('pri-route').classList.toggle('on',p==='route');
  }
  function setFilter(m){
    filterMode=m;
    document.getElementById('chip-all').classList.toggle('on',m==='all');
    document.getElementById('chip-rt').classList.toggle('on',m==='route');
    applyFilters();
  }
  function applyFilters(){
    const maxD=parseInt(document.getElementById('detour-f').value);
    document.getElementById('detour-v').textContent=maxD>=20?'any':maxD+'km';
    document.querySelectorAll('.scard').forEach(c=>{
      const detour=parseFloat(c.dataset.detour);
      let show=true;
      if(filterMode==='route'&&detour>3)show=false;
      if(maxD<20&&detour>maxD)show=false;
      c.classList.toggle('hidden',!show);
    });
  }
  function routeBadge(d){return d<=3?'✅':d<=8?'🔶':'❌';}
  function showErr(msg){const b=document.getElementById('error-box');b.innerHTML='⚠ '+msg;b.style.display='block';}
  function showWarn(msg){const b=document.getElementById('warn-box');b.innerHTML='ℹ '+msg;b.style.display='block';}
  function clearMessages(){document.getElementById('error-box').style.display='none';document.getElementById('warn-box').style.display='none';}
  function setBtn(html){document.getElementById('cta-btn').innerHTML=html;}
  function setProgress(pct){
    const bar=document.getElementById('prog-bar');
    bar.style.display=pct>0&&pct<100?'block':'none';
    document.getElementById('prog-fill').style.width=pct+'%';
  }

  // ── Sort results by priority ──────────────────────────────────────────────────
  function sortResults(results){
    if(priority==='route'){
      // Weighted score: penalise detour heavily (each extra km = $1 penalty equivalent)
      return [...results].sort((a,b)=>(a.total+a.detour*1.2)-(b.total+b.detour*1.2));
    }
    return [...results].sort((a,b)=>a.total-b.total);
  }

  // ── Route tab UI ──────────────────────────────────────────────────────────────
  const routeLabels={fastest:'⚡ Fastest',shortest:'📏 Shortest',eco:'🌿 Eco'};

  function renderRouteTabs(activeRt){
    const container=document.getElementById('route-tabs');
    container.innerHTML='';
    ['fastest','shortest','eco'].forEach(rt=>{
      const c=cache[rt];
      const tab=document.createElement('div');
      tab.className='rtab'+(rt===activeRt?' active':'')+(c?' cached':'');
      tab.onclick=()=>switchRouteTab(rt);
      tab.innerHTML=`
        <div class="rtab-label">${routeLabels[rt]}</div>
        ${c
          ? `<div class="rtab-dist">${c.routeKm.toFixed(1)} km · ${c.routeMins} min</div>
             <div class="rtab-stations">${c.results.length} stations</div>
             <div class="rtab-best">Best $${c.results[0]?.total.toFixed(2)||'—'}</div>`
          : `<div class="rtab-dist" style="color:#cbd5e1">${rt===activeRt?'searching…':'not searched'}</div>`
        }`;
      container.appendChild(tab);
    });
  }

  function switchRouteTab(rt){
    if(!cache[rt]){
      // Not yet searched — trigger a search for this route type
      routeType=rt;
      setRouteType(rt);
      runSearch();
      return;
    }
    activeRouteType=rt;
    renderRouteTabs(rt);
    renderStationList(cache[rt].results, cache[rt].baseDist, rt);
  }

  // ── Render station list ───────────────────────────────────────────────────────
  function renderStationList(rawResults, baseDist, rt){
    const sorted=sortResults(rawResults);
    const worst=sorted[sorted.length-1]?.total||0;
    sorted.forEach(r=>r.savings=worst-r.total);

    const list=document.getElementById('station-list');
    list.innerHTML='';
    document.getElementById('res-meta').textContent=
      `${sorted.length} stations · ${baseDist.toFixed(1)} km direct · ${priority==='route'?'prioritising route':'prioritising savings'}`;

    sorted.forEach((s,i)=>{
      const el=document.createElement('div');
      el.className='scard'+(i===0?' best':'');
      el.dataset.detour=s.detour;
      el.innerHTML=`
        <div>
          <div class="sc-top">
            <span>${routeBadge(s.detour)}</span>
            <span class="sc-name">${s.name}</span>
            <span class="bbadge">${s.brand}</span>
            ${s.corridorKm!=null?`<span class="corridor-badge">${s.corridorKm.toFixed(1)} km off route</span>`:''}
          </div>
          <div class="sc-meta">
            <span><i class="ti ti-map-pin"></i> ${s.toStation.toFixed(1)} km from start</span>
            <span><i class="ti ti-flag"></i> ${s.toDest.toFixed(1)} km to dest</span>
            <span><i class="ti ti-arrows-right-left"></i> +${s.detour.toFixed(1)} km detour</span>
          </div>
          <a class="nav-link" href="https://waze.com/ul?ll=${s.lat},${s.lon}&navigate=yes" target="_blank">
            <i class="ti ti-navigation"></i> Navigate via Waze
          </a>
        </div>
        <div class="price-col">
          <div class="p-eff">$${s.price.toFixed(3)}</div>
          <div class="p-sub">per litre</div>
          <div class="p-total">$${s.fillCost.toFixed(2)} to fill</div>
          <div class="p-total">$${s.total.toFixed(2)} trip total</div>
          ${i===0?`<div class="p-best">Best value</div>`:`<div class="p-save">save $${s.savings.toFixed(2)}</div>`}
        </div>`;
      list.appendChild(el);
    });
    applyFilters();
    document.getElementById('results-section').scrollIntoView({behavior:'smooth',block:'start'});
  }

  function renderResults(results, baseDist, routeKm, routeMins, rt){
    // Cache this route's results
    cache[rt]={results, baseDist, routeKm, routeMins};
    activeRouteType=rt;
    document.getElementById('results-section').style.display='block';
    renderRouteTabs(rt);
    renderStationList(results, baseDist, rt);
  }

  // ── Core search for one route type ───────────────────────────────────────────
  async function runSearch(){
    clearMessages();
    const dest=document.getElementById('dest').value.trim();
    if(!dest){showErr('Please enter a destination.');return;}
    if(!userLat){userLat=-33.8688;userLon=151.2093;showWarn('No GPS — using Sydney CBD. Click Detect Location for accuracy.');}

    const btn=document.getElementById('cta-btn');
    btn.disabled=true;
    setProgress(5);

    const economy  =parseFloat(document.getElementById('economy').value)||8.5;
    const tank     =parseFloat(document.getElementById('tank').value)||60;
    const gaugePct =parseFloat(document.getElementById('gauge').value)||25;
    const manualVol=parseFloat(document.getElementById('manual-vol').value)||0;
    const fuelType =document.getElementById('fueltype').value;
    const tripMult =tripMode==='return'?2:1;
    const liters   =manualVol>0?manualVol:+(tank*(1-gaugePct/100)).toFixed(1);
    const rt       =routeType;

    try{
      setBtn('<span class="spinner"></span> Geocoding destination…');
      const[dLat,dLon]=await geocode(dest);
      setProgress(12);

      setBtn('<span class="spinner"></span> Authenticating with NSW FuelCheck…');
      let token;
      try{token=await getNSWToken();}
      catch(e){
        showErr('NSW FuelCheck API error: '+e.message+'<br><br>CORS restriction — run via local server or Streamlit proxy.');
        btn.disabled=false;setBtn('<i class="ti ti-bolt"></i> Find Best Station · Ranked by Savings');setProgress(0);return;
      }
      setProgress(20);

      // Fetch route polyline (always needed for distance calc)
      setBtn(`<span class="spinner"></span> Fetching ${routeLabels[rt]} route…`);
      let routeData;
      try{routeData=await tomtomRoute(userLat,userLon,dLat,dLon,rt);}
      catch(e){showErr('TomTom: '+e.message);btn.disabled=false;setBtn('<i class="ti ti-bolt"></i> Find Best Station · Ranked by Savings');setProgress(0);return;}
      setProgress(30);

      let rawStations=[];

      if(searchMode==='near'){
        const radius=parseInt(document.getElementById('radius').value)||10;
        setBtn(`<span class="spinner"></span> Fetching ${fuelType} prices within ${radius} km…`);
        try{
          const raw=await fetchStations(userLat,userLon,radius,fuelType,token);
          rawStations=parseStations(raw,userLat,userLon);
        }catch(e){showErr('NSW FuelCheck: '+e.message);btn.disabled=false;setBtn('<i class="ti ti-bolt"></i> Find Best Station · Ranked by Savings');setProgress(0);return;}
        setProgress(55);

      }else{
        const corridorWidth=parseInt(document.getElementById('corridor-width').value)||5;
        const sampleKm=parseInt(document.getElementById('sample-km').value)||10;
        const samples=samplePolyline(routeData.points,sampleKm);
        const seen=new Set();
        for(let i=0;i<samples.length;i++){
          const[sLat,sLon]=samples[i];
          setBtn(`<span class="spinner"></span> Scanning corridor… (${i+1}/${samples.length})`);
          setProgress(30+Math.round((i/samples.length)*35));
          try{
            const raw=await fetchStations(sLat,sLon,corridorWidth+2,fuelType,token);
            for(const s of parseStations(raw,sLat,sLon)){
              const key=`${s.name}|${s.lat.toFixed(4)}|${s.lon.toFixed(4)}`;
              if(!seen.has(key)){
                seen.add(key);
                const off=distToPolyline(s.lat,s.lon,routeData.points);
                if(off<=corridorWidth)rawStations.push({...s,corridorKm:off});
              }
            }
          }catch{}
        }
        setProgress(65);
      }

      if(!rawStations.length){
        showWarn('No stations found. Try increasing the search radius / corridor width.');
        btn.disabled=false;setBtn('<i class="ti ti-bolt"></i> Find Best Station · Ranked by Savings');setProgress(0);return;
      }

      setBtn('<span class="spinner"></span> Calculating road distances…');
      const baseDist=routeData.distKm;
      const cap=Math.min(rawStations.length,25);
      const results=[];

      for(let i=0;i<cap;i++){
        const s=rawStations[i];
        setProgress(65+Math.round((i/cap)*30));
        const legA=await tomtomDist(userLat,userLon,s.lat,s.lon);
        const legB=await tomtomDist(s.lat,s.lon,dLat,dLon);
        const detour=Math.max(0,(legA+legB)-baseDist);
        const fillCost=liters*s.price;
        const legACost=(legA*economy/100)*s.price;
        const legBCost=(legB*tripMult*economy/100)*s.price;
        const total=fillCost+legACost+legBCost;
        results.push({...s,toStation:legA,toDest:legB,detour,fillCost,total,savings:0,corridorKm:s.corridorKm??null});
      }

      setProgress(100);
      renderResults(results,baseDist,routeData.distKm,routeData.mins,rt);

    }catch(e){showErr(e.message);}

    btn.disabled=false;
    setBtn('<i class="ti ti-bolt"></i> Find Best Station · Ranked by Savings');
    setProgress(0);
  }

  // ── Autocomplete ──────────────────────────────────────────────────────────────
  let acIndex=-1,acResults=[],acTimer=null;
  function onDestInput(){
    clearTimeout(acTimer);
    const q=document.getElementById('dest').value.trim();
    if(q.length<3){closeAc();return;}
    acTimer=setTimeout(()=>fetchAc(q),280);
  }
  async function fetchAc(q){
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&countrycodes=au`,{headers:{'User-Agent':'FuelOptimizer/2.0'}});
      acResults=(await r.json()).map(d=>d.display_name);renderAc();
    }catch{}
  }
  function renderAc(){
    const list=document.getElementById('ac-list');
    if(!acResults.length){closeAc();return;}
    acIndex=-1;
    list.innerHTML=acResults.map((r,i)=>`<div class="ac-item" onmousedown="pickAc(${i})">${r}</div>`).join('');
    list.classList.add('open');
  }
  function pickAc(i){document.getElementById('dest').value=acResults[i];closeAc();}
  function closeAc(){document.getElementById('ac-list').classList.remove('open');acResults=[];acIndex=-1;}
  function onDestKey(e){
    const items=document.querySelectorAll('.ac-item');
    if(!items.length)return;
    if(e.key==='ArrowDown'){e.preventDefault();acIndex=Math.min(acIndex+1,items.length-1);highlightAc(items);}
    else if(e.key==='ArrowUp'){e.preventDefault();acIndex=Math.max(acIndex-1,0);highlightAc(items);}
    else if(e.key==='Enter'&&acIndex>=0){e.preventDefault();pickAc(acIndex);}
    else if(e.key==='Escape')closeAc();
  }
  function highlightAc(items){
    items.forEach((el,i)=>el.classList.toggle('active',i===acIndex));
    if(acIndex>=0)items[acIndex].scrollIntoView({block:'nearest'});
  }
  document.addEventListener('click',e=>{if(!e.target.closest('.dest-wrap'))closeAc();});

  // init
  updateSummary();
</script>
</body>
</html>
